<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenLibrary</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
  <!-- Apply saved theme before first paint to prevent flash -->
  <script>(function(){try{var t=localStorage.getItem('ol-theme');if(t&&t!=='auto')document.documentElement.dataset.theme=t;}catch(e){}}());</script>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

    /* ── Dark theme (default) ── */
    html{
      --bg:#121212;--bg2:#1c1c1c;--surface:#242424;--surface-raised:#2e2e2e;
      --border:rgba(255,255,255,.1);--border-strong:rgba(255,255,255,.2);
      --text:#f2f2f2;--muted:#888888;
      --input-bg:rgba(255,255,255,.06);--card-bg:rgba(255,255,255,.04);
      --header-bg:rgba(18,18,18,.92);--modal-bg:#1c1c1c;
      --btn-primary-bg:#efefef;--btn-primary-text:#111111;
      --btn-secondary-bg:rgba(255,255,255,.07);--btn-secondary-border:rgba(255,255,255,.13);
      --cover-ph:#2c2c2c;--cover-ph-text:rgba(255,255,255,.18);
      --series-color:#b0b0b0;--tag-bg:rgba(255,255,255,.07);--tag-border:rgba(255,255,255,.12);
      --scrollbar:rgba(255,255,255,.18);--shadow:rgba(0,0,0,.55);
      --logo-from:#d0d0d0;--logo-to:#ffffff;
      --status-info-bg:rgba(100,181,246,.1);--status-info-border:rgba(100,181,246,.25);
      --status-info-text:#7ec8f8;
      --status-error-bg:rgba(255,82,82,.1);--status-error-border:rgba(255,82,82,.25);
      --status-error-text:#ff8a80;
      --radius:10px;--transition:.18s ease;
    }
    /* ── Light theme — applied when system prefers light and no manual override ── */
    @media(prefers-color-scheme:light){
      html:not([data-theme]){
        --bg:#f0f0f0;--bg2:#ffffff;--surface:#e4e4e4;--surface-raised:#ffffff;
        --border:rgba(0,0,0,.1);--border-strong:rgba(0,0,0,.2);
        --text:#1a1a1a;--muted:#636363;
        --input-bg:rgba(0,0,0,.04);--card-bg:rgba(0,0,0,.03);
        --header-bg:rgba(240,240,240,.92);--modal-bg:#ffffff;
        --btn-primary-bg:#1a1a1a;--btn-primary-text:#ffffff;
        --btn-secondary-bg:rgba(0,0,0,.05);--btn-secondary-border:rgba(0,0,0,.12);
        --cover-ph:#d4d4d4;--cover-ph-text:rgba(0,0,0,.2);
        --series-color:#555555;--tag-bg:rgba(0,0,0,.05);--tag-border:rgba(0,0,0,.1);
        --scrollbar:rgba(0,0,0,.2);--shadow:rgba(0,0,0,.12);
        --logo-from:#333333;--logo-to:#000000;
        --status-info-bg:rgba(30,120,190,.08);--status-info-border:rgba(30,120,190,.2);
        --status-info-text:#1565c0;
        --status-error-bg:rgba(200,0,0,.07);--status-error-border:rgba(200,0,0,.2);
        --status-error-text:#c62828;
      }
    }
    /* ── Manual light override ── */
    html[data-theme='light']{
      --bg:#f0f0f0;--bg2:#ffffff;--surface:#e4e4e4;--surface-raised:#ffffff;
      --border:rgba(0,0,0,.1);--border-strong:rgba(0,0,0,.2);
      --text:#1a1a1a;--muted:#636363;
      --input-bg:rgba(0,0,0,.04);--card-bg:rgba(0,0,0,.03);
      --header-bg:rgba(240,240,240,.92);--modal-bg:#ffffff;
      --btn-primary-bg:#1a1a1a;--btn-primary-text:#ffffff;
      --btn-secondary-bg:rgba(0,0,0,.05);--btn-secondary-border:rgba(0,0,0,.12);
      --cover-ph:#d4d4d4;--cover-ph-text:rgba(0,0,0,.2);
      --series-color:#555555;--tag-bg:rgba(0,0,0,.05);--tag-border:rgba(0,0,0,.1);
      --scrollbar:rgba(0,0,0,.2);--shadow:rgba(0,0,0,.12);
      --logo-from:#333333;--logo-to:#000000;
      --status-info-bg:rgba(30,120,190,.08);--status-info-border:rgba(30,120,190,.2);
      --status-info-text:#1565c0;
      --status-error-bg:rgba(200,0,0,.07);--status-error-border:rgba(200,0,0,.2);
      --status-error-text:#c62828;
    }
    /* ── Sepia theme ── */
    html[data-theme='sepia']{
      --bg:#f3ead3;--bg2:#faf4e4;--surface:#ede3c8;--surface-raised:#faf4e4;
      --border:rgba(100,70,30,.15);--border-strong:rgba(100,70,30,.28);
      --text:#3b2a1a;--muted:#7a6040;
      --input-bg:rgba(100,70,30,.06);--card-bg:rgba(100,70,30,.04);
      --header-bg:rgba(243,234,211,.92);--modal-bg:#faf4e4;
      --btn-primary-bg:#4a3320;--btn-primary-text:#faf4e4;
      --btn-secondary-bg:rgba(100,70,30,.07);--btn-secondary-border:rgba(100,70,30,.15);
      --cover-ph:#dfd5be;--cover-ph-text:rgba(60,40,10,.2);
      --series-color:#7a6040;--tag-bg:rgba(100,70,30,.07);--tag-border:rgba(100,70,30,.14);
      --scrollbar:rgba(100,70,30,.25);--shadow:rgba(80,50,10,.18);
      --logo-from:#6b4c24;--logo-to:#3b2a1a;
      --status-info-bg:rgba(90,130,80,.1);--status-info-border:rgba(90,130,80,.25);
      --status-info-text:#4a7c40;
      --status-error-bg:rgba(180,60,10,.1);--status-error-border:rgba(180,60,10,.25);
      --status-error-text:#b83c0a;
    }

    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      background:var(--bg);color:var(--text);min-height:100vh;
      transition:background .22s ease,color .22s ease;}
    a{color:inherit}
    button{cursor:pointer;font-family:inherit}

    /* ── Header ── */
    header{
      position:sticky;top:0;z-index:100;
      background:var(--header-bg);backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);padding:14px 24px;
    }
    .header-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
    .logo-group{display:flex;align-items:center;gap:10px;flex-shrink:0}
    .logo-group h1{font-size:1.35rem;
      background:linear-gradient(135deg,var(--logo-from),var(--logo-to));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .logo-icon{font-size:1.4rem}
    /* ── Sources button (in header-actions) ── */
    .btn-sources{display:inline-flex;align-items:center;gap:7px;
      padding:7px 14px;background:var(--btn-secondary-bg);
      border:1px solid var(--btn-secondary-border);border-radius:8px;
      color:var(--text);font-size:.85rem;font-weight:600;white-space:nowrap;
      transition:border-color var(--transition),background var(--transition)}
    .btn-sources:hover{background:var(--surface-raised);border-color:var(--border-strong)}
    /* ── Sources manager modal ── */
    .sources-modal-box{
      max-width:660px;display:flex;flex-direction:column;
      max-height:85vh;overflow:hidden;
    }
    .sources-modal-box.modal-box{overflow:hidden}
    .sources-modal-header{
      display:flex;align-items:center;justify-content:space-between;
      padding:20px 24px 16px;border-bottom:1px solid var(--border);flex-shrink:0;
    }
    .sources-modal-title{font-size:1.05rem;font-weight:700}
    .sources-modal-toolbar{
      display:flex;align-items:center;gap:8px;
      padding:14px 16px;border-bottom:1px solid var(--border);
      flex-wrap:wrap;flex-shrink:0;
    }
    .sources-modal-toolbar .btn-primary{margin-left:auto}
    .src-import-panel{
      padding:14px 16px;border-bottom:1px solid var(--border);
      flex-shrink:0;display:none;
    }
    .src-import-panel.show{display:block}
    .src-import-ta{
      min-height:90px;resize:vertical;
      font-family:ui-monospace,"Cascadia Code",monospace;font-size:.78rem;
    }
    #srcList{overflow-y:auto;flex:1}
    .src-panel-header{padding:14px 16px 10px;
      font-size:.72rem;font-weight:700;letter-spacing:.07em;
      text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border)}
    .src-empty{padding:20px 16px;color:var(--muted);font-size:.85rem;text-align:center}
    .src-row{
      display:grid;
      grid-template-columns:1fr auto;
      align-items:start;
      gap:8px;
      padding:12px 16px;
      border-bottom:1px solid var(--border);
    }
    .src-row:last-of-type{border-bottom:none}
    .src-info{min-width:0}
    .src-name{font-weight:600;font-size:.88rem;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .src-url{font-size:.73rem;color:var(--muted);margin-top:2px;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .src-count{font-size:.72rem;margin-top:4px;
      display:inline-flex;align-items:center;gap:4px}
    .src-count-badge{background:var(--tag-bg);border:1px solid var(--border);
      border-radius:100px;padding:1px 8px;font-size:.7rem}
    .src-count-loading{color:var(--muted)}
    .src-actions{display:flex;align-items:center;gap:4px;flex-shrink:0;padding-top:2px}
    .src-btn{background:none;border:1px solid var(--border);border-radius:6px;
      color:var(--muted);padding:4px 8px;font-size:.75rem;line-height:1.4;
      transition:background var(--transition),color var(--transition),border-color var(--transition)}
    .src-btn:hover{background:var(--tag-bg);color:var(--text);border-color:var(--border-strong)}
    .src-panel-footer{padding:12px 16px;border-top:1px solid var(--border)}
    .header-actions{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
    .theme-select{padding:7px 10px;background:var(--btn-secondary-bg);
      border:1px solid var(--btn-secondary-border);
      border-radius:8px;color:var(--text);font-size:.8rem;outline:none;cursor:pointer;
      transition:border-color var(--transition)}
    .theme-select:hover{border-color:var(--border-strong)}
    .theme-select option{background:var(--modal-bg)}
    .btn-add{background:var(--btn-primary-bg);border:none;
      color:var(--btn-primary-text);padding:8px 18px;border-radius:8px;
      font-size:.85rem;font-weight:600;
      transition:opacity var(--transition);white-space:nowrap;}
    .btn-add:hover{opacity:.75}

    /* ── Toolbar ── */
    .toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:16px 24px 0}
    .search-wrap{position:relative;flex:1;min-width:200px}
    .search-wrap::before{content:'🔍';position:absolute;left:12px;top:50%;
      transform:translateY(-50%);pointer-events:none;font-size:.9rem}
    #searchInput{width:100%;padding:9px 14px 9px 36px;
      background:var(--input-bg);border:1px solid var(--border);
      border-radius:8px;color:var(--text);font-size:.9rem;outline:none;
      transition:border-color var(--transition)}
    #searchInput:focus{border-color:var(--border-strong)}
    #searchInput::placeholder{color:var(--muted)}
    select{padding:9px 14px;background:var(--input-bg);
      border:1px solid var(--border);border-radius:8px;
      color:var(--text);font-size:.85rem;outline:none;cursor:pointer}
    select option{background:var(--modal-bg)}
    .book-count{color:var(--muted);font-size:.82rem;white-space:nowrap}

    /* ── Status banner ── */
    .status-banner{margin:14px 24px 0;padding:10px 16px;border-radius:8px;
      font-size:.85rem;display:none}
    .status-banner.info{background:var(--status-info-bg);border:1px solid var(--status-info-border);color:var(--status-info-text)}
    .status-banner.error{background:var(--status-error-bg);border:1px solid var(--status-error-border);color:var(--status-error-text)}
    .status-banner.show{display:block}

    /* ── Grid ── */
    .book-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
      gap:18px;padding:18px 24px;
    }
    .book-card{
      background:var(--card-bg);border:1px solid var(--border);
      border-radius:var(--radius);overflow:hidden;cursor:pointer;
      transition:transform var(--transition),border-color var(--transition),
        box-shadow var(--transition);display:flex;flex-direction:column;
    }
    .book-card:hover{transform:translateY(-4px);border-color:var(--border-strong);
      box-shadow:0 8px 28px var(--shadow)}
    .cover-wrap{width:100%;aspect-ratio:2/3;overflow:hidden;flex-shrink:0;position:relative}
    .cover-wrap img,.cover-placeholder{width:100%;height:100%;object-fit:cover;display:block}
    .cover-placeholder{
      display:flex;align-items:center;justify-content:center;
      font-size:3rem;font-weight:700;color:var(--cover-ph-text);
      background:var(--cover-ph);
    }
    .book-info{padding:10px 10px 12px;flex:1;display:flex;flex-direction:column;gap:4px}
    .book-title{font-size:.82rem;font-weight:600;line-height:1.3;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .book-author{font-size:.73rem;color:var(--muted);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .book-series{font-size:.68rem;color:var(--series-color);margin-top:auto;padding-top:4px;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .book-card-dl{margin-top:8px;padding:5px 0;width:100%;
      background:var(--tag-bg);border:1px solid var(--border);
      border-radius:6px;font-size:.75rem;color:var(--text);
      transition:background var(--transition)}
    .book-card-dl:hover{background:var(--surface-raised)}

    /* ── Empty / Loading state ── */
    .empty-state{text-align:center;padding:80px 24px;color:var(--muted);display:none}
    .empty-state.show{display:block}
    .empty-icon{font-size:4rem;margin-bottom:16px}
    .empty-title{font-size:1.1rem;margin-bottom:8px;color:var(--text)}
    .empty-sub{font-size:.9rem}

    /* ── Pagination ── */
    .pagination{display:flex;justify-content:center;align-items:center;
      gap:6px;padding:20px 24px 32px;flex-wrap:wrap}
    .page-btn{min-width:36px;height:36px;padding:0 8px;
      background:var(--card-bg);border:1px solid var(--border);
      border-radius:6px;color:var(--text);font-size:.85rem;
      transition:background var(--transition),border-color var(--transition)}
    .page-btn:hover,.page-btn.active{background:var(--tag-bg);border-color:var(--border-strong)}
    .page-btn.active{font-weight:700}
    .page-dots{color:var(--muted);padding:0 4px}

    /* ── Modals (shared) ── */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);
      backdrop-filter:blur(4px);z-index:200;display:flex;
      align-items:center;justify-content:center;padding:20px;opacity:0;
      pointer-events:none;transition:opacity .22s ease}
    .overlay.open{opacity:1;pointer-events:all}
    .modal-box{background:var(--modal-bg);border:1px solid var(--border);
      border-radius:14px;max-height:90vh;overflow-y:auto;width:100%;
      transform:translateY(12px);transition:transform .22s ease;
      box-shadow:0 24px 64px var(--shadow);}
    .overlay.open .modal-box{transform:none}

    /* ── Book detail modal ── */
    .book-modal-box{max-width:600px}
    .bm-inner{display:flex;gap:24px;padding:28px;align-items:flex-start}
    @media(max-width:520px){.bm-inner{flex-direction:column}.bm-cover{align-self:center}}
    .bm-cover{flex-shrink:0;width:140px;border-radius:8px;overflow:hidden;
      box-shadow:0 6px 24px rgba(0,0,0,.5)}
    .bm-cover img,.bm-cover .bm-cover-ph{width:140px;height:210px;object-fit:cover;display:block}
    .bm-cover-ph{background:var(--cover-ph);
      display:flex;align-items:center;justify-content:center;
      font-size:2.5rem;font-weight:700;color:var(--cover-ph-text)}
    .bm-meta{flex:1;min-width:0}
    .bm-title{font-size:1.2rem;font-weight:700;line-height:1.3;margin-bottom:6px}
    .bm-author{color:var(--series-color);font-size:.9rem;margin-bottom:14px}
    .meta-row{display:flex;gap:8px;font-size:.82rem;margin-bottom:6px;align-items:baseline}
    .meta-label{color:var(--muted);flex-shrink:0;width:90px}
    .meta-value{color:var(--text)}
    .bm-formats{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px}
    .btn-dl{display:inline-flex;align-items:center;gap:7px;
      padding:9px 18px;border-radius:8px;font-size:.85rem;font-weight:600;
      border:none;color:var(--btn-primary-text);background:var(--btn-primary-bg);
      transition:opacity var(--transition),transform var(--transition)}
    .btn-dl:hover{opacity:.75;transform:translateY(-1px)}
    .btn-dl:disabled{opacity:.45;transform:none;cursor:wait}
    .btn-read{text-decoration:none;cursor:pointer}
    .btn-read:hover{opacity:.75;transform:translateY(-1px)}
    .bm-close{position:absolute;top:14px;right:14px;background:none;border:none;
      color:var(--muted);font-size:1.4rem;line-height:1;padding:4px;
      transition:color var(--transition)}
    .bm-close:hover{color:var(--text)}
    .modal-box{position:relative}
    .bm-source-tag{display:inline-block;background:var(--tag-bg);
      border:1px solid var(--tag-border);border-radius:100px;
      padding:2px 10px;font-size:.72rem;color:var(--muted);margin-bottom:8px}

    /* ── Add-source dialog ── */
    .dlg-box{max-width:500px;padding:28px}
    .dlg-title{font-size:1.05rem;font-weight:700;margin-bottom:18px;
      display:flex;align-items:center;gap:8px}
    .dlg-label{font-size:.82rem;color:var(--muted);margin-bottom:7px;display:block}
    .dlg-input{width:100%;padding:10px 14px;
      background:var(--input-bg);border:1px solid var(--border);
      border-radius:8px;color:var(--text);font-size:.9rem;outline:none;
      transition:border-color var(--transition)}
    .dlg-input:focus{border-color:var(--border-strong)}
    .dlg-input::placeholder{color:var(--muted)}
    .dlg-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;flex-wrap:wrap}
    .btn-secondary{padding:8px 18px;border-radius:8px;background:var(--btn-secondary-bg);
      border:1px solid var(--btn-secondary-border);color:var(--text);font-size:.85rem;
      transition:background var(--transition)}
    .btn-secondary:hover{background:var(--surface-raised)}
    .btn-primary{padding:8px 20px;border-radius:8px;border:none;
      background:var(--btn-primary-bg);color:var(--btn-primary-text);
      font-size:.85rem;font-weight:600;transition:opacity var(--transition)}
    .btn-primary:hover{opacity:.75}
    .btn-primary:disabled{opacity:.45;cursor:not-allowed}
    .preview-box{margin-top:16px;padding:14px;background:var(--tag-bg);
      border:1px solid var(--border);border-radius:8px;display:none}
    .preview-box.show{display:block}
    .preview-name{font-weight:600;font-size:.95rem;margin-bottom:4px}
    .preview-count{font-size:.8rem;color:var(--muted)}
    .linked-list{margin-top:12px;display:flex;flex-direction:column;gap:8px}
    .linked-item{display:flex;align-items:center;gap:10px;font-size:.82rem}
    .linked-item input[type=checkbox]{width:15px;height:15px;accent-color:var(--btn-primary-bg);flex-shrink:0}
    .linked-name{font-weight:600}
    .linked-url{color:var(--muted);font-size:.74rem;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px}
    .linked-already{font-size:.72rem;color:#81c784;margin-left:auto;flex-shrink:0}
    .error-msg{color:var(--status-error-text);font-size:.82rem;margin-top:10px;display:none}
    .error-msg.show{display:block}
    .spinner{display:inline-block;width:16px;height:16px;
      border:2px solid rgba(128,128,128,.35);border-top-color:currentColor;
      border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}
    .dl-prog-wrap{position:relative;display:inline-flex;align-items:center;
      min-width:170px;height:1.15em;background:rgba(0,0,0,.18);
      border-radius:4px;overflow:hidden}
    .dl-prog-bar{position:absolute;left:0;top:0;height:100%;
      background:rgba(255,255,255,.32);border-radius:4px;
      transition:width .12s linear}
    .dl-prog-label{position:relative;z-index:1;font-size:.8rem;
      white-space:nowrap;padding:0 8px;letter-spacing:.01em}
    .key-dlg-desc{font-size:.88rem;color:var(--text);margin-bottom:14px;line-height:1.5}
    .hint{font-size:.77rem;color:var(--muted);margin-top:6px}
    .hint code{background:var(--tag-bg);border:1px solid var(--border);
      border-radius:4px;padding:1px 5px;font-size:.76rem;color:var(--text)}

    /* ── Scrollbar ── */
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:3px}
  </style>
</head>
<body>

<header>
  <div class="header-row">
    <div class="logo-group">
      <span class="logo-icon">📚</span>
      <h1>OpenLibrary</h1>
    </div>
    <div class="header-actions">
      <select class="theme-select" id="themeSelect" title="Theme">
        <option value="auto">🌗 Auto</option>
        <option value="light">☀️ Light</option>
        <option value="dark">🌙 Dark</option>
        <option value="sepia">📜 Sepia</option>
      </select>
      <button class="btn-sources" id="btnSources">
        <span id="srcBtnLabel">📚 Sources</span>
      </button>
    </div>
  </div>
</header>

<main>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════
// CRYPTO — mirrors crypto.js / library.go parameters exactly
// ═══════════════════════════════════════════════════════════════
const CRYPTO = {
  SALT_SIZE: 16, NONCE_SIZE: 12, ITERATIONS: 100000, KEY_SIZE: 256,

  async decryptWithPassword(encryptedData, password) {
    const view = new Uint8Array(encryptedData);
    const salt  = view.slice(0, this.SALT_SIZE);
    const nonce = view.slice(this.SALT_SIZE, this.SALT_SIZE + this.NONCE_SIZE);
    const ct    = view.slice(this.SALT_SIZE + this.NONCE_SIZE);
    const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(password),
      'PBKDF2', false, ['deriveBits']);
    const bits = await crypto.subtle.deriveBits(
      { name:'PBKDF2', salt, iterations:this.ITERATIONS, hash:'SHA-256' }, km, this.KEY_SIZE);
    const key = await crypto.subtle.importKey('raw', bits, 'AES-GCM', false, ['decrypt']);
    const plain = await crypto.subtle.decrypt({ name:'AES-GCM', iv:nonce }, key, ct);
    return new Uint8Array(plain);
  },

  async decryptWithKey(encryptedData, keyBuffer) {
    const view  = new Uint8Array(encryptedData);
    const nonce = view.slice(0, this.NONCE_SIZE);
    const ct    = view.slice(this.NONCE_SIZE);
    const key = await crypto.subtle.importKey('raw', keyBuffer, 'AES-GCM', false, ['decrypt']);
    const plain = await crypto.subtle.decrypt({ name:'AES-GCM', iv:nonce }, key, ct);
    return new Uint8Array(plain);
  },

  hexToBuffer(hex) {
    const b = new Uint8Array(hex.length / 2);
    for (let i = 0; i < hex.length; i += 2) b[i/2] = parseInt(hex.substr(i,2), 16);
    return b;
  },

  formatBytes(n, d=2) {
    if (!n) return '—';
    const k=1024, s=['B','KB','MB','GB'], i=Math.floor(Math.log(n)/Math.log(k));
    return (n/k**i).toFixed(d)+' '+s[i];
  }
};

// ═══════════════════════════════════════════════════════════════
// URL hash state  —  persists library source list client-side
// ═══════════════════════════════════════════════════════════════
function b64enc(str) {
  return btoa(unescape(encodeURIComponent(str)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
function b64dec(str) {
  str = str.replace(/-/g,'+').replace(/_/g,'/');
  while (str.length%4) str+='=';
  return decodeURIComponent(escape(atob(str)));
}
function loadSources() {
  const h = location.hash.slice(1);
  if (!h) return [];
  try { return JSON.parse(b64dec(h)); } catch { return []; }
}
function saveSources(arr) {
  history.replaceState(null,'','#'+b64enc(JSON.stringify(arr)));
}

// ═══════════════════════════════════════════════════════════════
// Library loader
// ═══════════════════════════════════════════════════════════════
// state.sources  = [{url, name}]
// state.libs     = Map<url, {lib.json obj, books: Map<id, entry>}>
// state.books    = [] (flat sorted/filtered view)
const state = {
  sources: loadSources(),
  libs: new Map(),     // url → {name, encryption_type, links, books: Map}
  books: [],           // all books flat
  filtered: [],        // after search+sort
  page: 1,
  perPage: 20,
  search: '',
  sort: 'series',
  coverCache: new Map() // bookId → objectURL
};

function normaliseUrl(url) {
  url = url.trim();
  // github:owner/repo  →  https://raw.githubusercontent.com/owner/repo/refs/heads/main
  const ghMatch = url.match(/^github:([A-Za-z0-9_.-]+\/[A-Za-z0-9_.\-]+?)\/?$/i);
  if (ghMatch) {
    url = `https://raw.githubusercontent.com/${ghMatch[1]}/refs/heads/main`;
  }
  return url.replace(/\/+$/, '');
}

async function fetchLib(url) {
  const res = await fetch(url+'/lib.json', { cache:'no-cache' });
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  return res.json();
}

async function decryptIndex(lib, password) {
  const raw = atob(lib.index);
  const buf = new Uint8Array(raw.length);
  for (let i=0;i<raw.length;i++) buf[i]=raw.charCodeAt(i);
  const plain = await CRYPTO.decryptWithPassword(buf.buffer, password||'0');
  return JSON.parse(new TextDecoder().decode(plain));
}

async function loadLibrary(url) {
  url = normaliseUrl(url);
  const src = state.sources.find(s => normaliseUrl(s.url) === url);
  const libJson = await fetchLib(url);
  let password;
  if (libJson.encryption_type === 0) {
    password = '0';
  } else if (src?.password) {
    password = src.password;
  } else {
    throw new Error('Library requires a password — remove and re-add the source to enter one.');
  }
  const books = await decryptIndex(libJson, password);
  const bookMap = new Map(Object.entries(books));
  state.libs.set(url, {
    name: libJson.name || url,
    encryption_type: libJson.encryption_type,
    links: libJson.links || {},
    books: bookMap
  });
  rebuildBookList();
  return { name: libJson.name, links: libJson.links || {}, bookCount: bookMap.size };
}

// Build a flat array of per-format download descriptors for one raw book.
function buildFormatEntries(book) {
  const e = book.entry;
  const formats = e.formats || [];
  return formats.map(fmt => {
    let sourceFile = null;
    if (typeof e.source === 'string') {
      sourceFile = e.source;   // legacy single-file entry
    } else if (e.source && typeof e.source === 'object') {
      sourceFile = e.source[fmt] || null;
    }
    let filesize = null;
    if (e.filesize != null) {
      if (typeof e.filesize === 'object') {
        filesize = e.filesize[fmt] ?? null;
      } else {
        // scalar filesize: assign only when this is the sole format
        filesize = formats.length === 1 ? e.filesize : null;
      }
    }
    return { format: fmt, libUrl: book.libUrl, libName: book.libName,
             sourceFile, filesize, sourceKey: e.source_key, bookId: book.id };
  });
}

// Merge raw books that share (title, author, series) into a single UI record.
function mergeBooks(rawBooks) {
  const merged = new Map();
  for (const book of rawBooks) {
    const e = book.entry;
    const key = [
      (e.title  || '').toLowerCase().trim(),
      (e.author || '').toLowerCase().trim(),
      (e.series || '').toLowerCase().trim()
    ].join('\x00');
    if (!merged.has(key)) {
      merged.set(key, {
        id:           book.id,
        entry:        e,
        libUrl:       book.libUrl,
        libName:      book.libName,
        formatEntries: buildFormatEntries(book),
        merged:       false
      });
    } else {
      const m = merged.get(key);
      m.formatEntries.push(...buildFormatEntries(book));
      m.merged = true;
    }
  }
  return [...merged.values()];
}

function rebuildBookList() {
  const rawBooks = [];
  for (const [url, lib] of state.libs) {
    for (const [id, entry] of lib.books) {
      rawBooks.push({ id, entry, libUrl: url, libName: lib.name });
    }
  }
  state.books = mergeBooks(rawBooks);
  applyFilter();
}

function applyFilter() {
  const q = state.search.toLowerCase();
  let arr = state.books.filter(b => {
    if (!q) return true;
    const e = b.entry;
    return (e.title||'').toLowerCase().includes(q)
      || (e.author||'').toLowerCase().includes(q)
      || (e.series||'').toLowerCase().includes(q);
  });
  const sort = state.sort;
  arr.sort((a, b) => {
    const ae=a.entry, be=b.entry;
    if (sort==='series') {
      const sa=ae.series||'', sb=be.series||'';
      if (sa!==sb) return sa<sb?-1:1;
      const ia=(ae.series_index||0), ib=(be.series_index||0);
      if (ia!==ib) return ia-ib;
      return (ae.title||'').localeCompare(be.title||'');
    }
    if (sort==='title'||sort==='title_desc') {
      const cmp=(ae.title||'').localeCompare(be.title||'');
      return sort==='title'?cmp:-cmp;
    }
    if (sort==='author') return (ae.author||'').localeCompare(be.author||'');
    return 0;
  });
  state.filtered = arr;
  state.page = 1;
  renderAll();
}

// ═══════════════════════════════════════════════════════════════
// Rendering
// ═══════════════════════════════════════════════════════════════
function renderAll() {
  renderChips();
  renderGrid();
  renderPagination();
  const total = state.books.length;
  document.getElementById('bookCount').textContent =
    total ? `${state.filtered.length} book${state.filtered.length!==1?'s':''}`+
            (state.filtered.length<total?` (of ${total})`:'') : '';
  document.getElementById('toolbar').style.display = total ? 'flex' : 'none';
  const es = document.getElementById('emptyState');
  if (total===0 && state.sources.length===0) {
    es.classList.add('show');
    es.querySelector('.empty-sub').innerHTML =
      'Click <strong>+ Add Source</strong> and enter a library URL to get started.';
  } else if (total===0 && state.sources.length>0) {
    es.classList.add('show');
    es.querySelector('.empty-sub').textContent = 'Loading libraries…';
  } else {
    es.classList.remove('show');
  }
}

function renderChips() {
  const list = document.getElementById('srcList');
  list.innerHTML = '';

  if (state.sources.length === 0) {
    list.innerHTML = '<div class="src-empty">No sources added yet.</div>';
  } else {
    for (const src of state.sources) {
      const url = normaliseUrl(src.url);
      const lib = state.libs.get(url);
      const name = lib ? lib.name : src.name || src.url;
      const isLoading = !lib && state.sources.find(s => normaliseUrl(s.url) === url);

      let countHtml;
      if (lib) {
        countHtml = `<span class="src-count-badge">${lib.books.size} book${lib.books.size!==1?'s':''}</span>`;
      } else {
        countHtml = `<span class="src-count-loading">loading…</span>`;
      }

      const row = document.createElement('div');
      row.className = 'src-row';
      row.innerHTML = `
        <div class="src-info">
          <div class="src-name" title="${esc(name)}">${esc(name)}</div>
          <div class="src-url" title="${esc(src.url)}">${esc(src.url)}</div>
          <div class="src-count">${countHtml}</div>
        </div>
        <div class="src-actions">
          <button class="src-btn" data-action="copy" data-url="${esc(src.url)}" title="Copy URL">⎘ Copy</button>
          <button class="src-btn danger" data-action="remove" data-url="${esc(src.url)}" title="Remove source">✕ Remove</button>
        </div>
      `;
      list.appendChild(row);
    }
  }

  // Update button label
  const n = state.sources.length;
  document.getElementById('srcBtnLabel').textContent =
    n === 0 ? '📚 Sources' : `📚 Sources (${n})`;

  list.querySelectorAll('.src-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const url = btn.dataset.url;
      if (btn.dataset.action === 'remove') {
        removeSource(url);
      } else if (btn.dataset.action === 'copy') {
        navigator.clipboard.writeText(url).then(() => {
          const orig = btn.textContent;
          btn.textContent = '✓ Copied';
          setTimeout(() => { btn.textContent = orig; }, 1800);
        }).catch(() => prompt('Source URL:', url));
      }
    });
  });
}

function renderGrid() {
  const grid = document.getElementById('bookGrid');
  grid.innerHTML = '';
  const start = (state.page-1)*state.perPage;
  const page = state.filtered.slice(start, start+state.perPage);
  for (const book of page) {
    const card = makeCard(book);
    grid.appendChild(card);
  }
  // Kick off IntersectionObserver for lazy cover loading
  observeCovers();
}

function makeCard(book) {
  const e = book.entry;
  const card = document.createElement('div');
  card.className = 'book-card';
  card.dataset.bookId = book.id;
  card.dataset.libUrl = book.libUrl;

  const initial = (e.title||'?')[0].toUpperCase();
  card.innerHTML = `
    <div class="cover-wrap">
      <div class="cover-placeholder lazy-cover" id="cp-${book.id}">${initial}</div>
    </div>
    <div class="book-info">
      <div class="book-title">${esc(e.title||'Untitled')}</div>
      <div class="book-author">${esc(e.author||'Unknown')}</div>
      ${e.series ? `<div class="book-series">${esc(e.series)} #${+(e.series_index||0)}</div>` : ''}
    </div>
  `;
  // If cover already cached, show immediately
  if (state.coverCache.has(book.id)) {
    replaceCoverPlaceholder(card, state.coverCache.get(book.id));
  }
  card.addEventListener('click', () => openBookModal(book));
  return card;
}

// Lazy cover loading via IntersectionObserver
let coverObserver = null;
function observeCovers() {
  if (coverObserver) coverObserver.disconnect();
  coverObserver = new IntersectionObserver(async (entries) => {
    for (const entry of entries) {
      if (!entry.isIntersecting) continue;
      const el = entry.target;
      coverObserver.unobserve(el);
      const bookId = el.id.replace('cp-','');
      await loadCover(bookId);
    }
  }, { rootMargin: '100px' });
  document.querySelectorAll('.lazy-cover').forEach(el => coverObserver.observe(el));
}

async function loadCover(bookId) {
  if (state.coverCache.has(bookId)) return;
  // Find book
  const book = state.filtered.find(b => b.id===bookId)
    || state.books.find(b => b.id===bookId);
  if (!book || !book.entry.source_cover) return;
  const lib = state.libs.get(normaliseUrl(book.libUrl));
  if (!lib) return;
  try {
    const keyBuf = CRYPTO.hexToBuffer(book.entry.source_key);
    const res = await fetch(`${normaliseUrl(book.libUrl)}/${book.entry.source_cover}`);
    if (!res.ok) return;
    const enc = await res.arrayBuffer();
    const plain = await CRYPTO.decryptWithKey(enc, keyBuf);
    const mime = detectImageMime(plain);
    const url = URL.createObjectURL(new Blob([plain], { type: mime }));
    state.coverCache.set(bookId, url);
    // Update all card placeholders on current page
    const ph = document.getElementById('cp-'+bookId);
    if (ph) {
      const card = ph.closest('.book-card');
      if (card) replaceCoverPlaceholder(card, url);
    }
    // Also update the book modal if open
    const bmImg = document.getElementById('bmCoverImg');
    if (bmImg && bmImg.dataset.bookId === bookId) {
      bmImg.src = url;
      document.getElementById('bmCoverPh').style.display = 'none';
      bmImg.style.display = 'block';
    }
  } catch { /* cover load failed silently */ }
}

function replaceCoverPlaceholder(card, url) {
  const ph = card.querySelector('.lazy-cover, .cover-placeholder');
  if (!ph) return;
  const img = document.createElement('img');
  img.src = url;
  img.alt = 'cover';
  img.style.width='100%';img.style.height='100%';img.style.objectFit='cover';
  ph.replaceWith(img);
}

function detectImageMime(bytes) {
  if (bytes[0]===0x89 && bytes[1]===0x50) return 'image/png';
  if (bytes[0]===0xFF && bytes[1]===0xD8) return 'image/jpeg';
  if (bytes[0]===0x47 && bytes[1]===0x49) return 'image/gif';
  if (bytes[0]===0x52 && bytes[4]===0x57) return 'image/webp';
  return 'image/jpeg';
}

function renderPagination() {
  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  const total = Math.ceil(state.filtered.length / state.perPage);
  if (total <= 1) return;
  const cur = state.page;

  const mkBtn = (label, page, active=false, disabled=false) => {
    const b = document.createElement('button');
    b.className = 'page-btn' + (active?' active':'');
    b.textContent = label;
    b.disabled = disabled;
    if (!disabled) b.addEventListener('click', () => { state.page=page; renderGrid(); renderPagination(); window.scrollTo(0,0); });
    return b;
  };
  pg.appendChild(mkBtn('←', cur-1, false, cur===1));

  // always show first, last, and up to 3 around current
  const pages = new Set([1, total]);
  for (let i=Math.max(1,cur-2); i<=Math.min(total,cur+2); i++) pages.add(i);
  let prev = 0;
  for (const p of [...pages].sort((a,b)=>a-b)) {
    if (p - prev > 1) { const d=document.createElement('span'); d.className='page-dots'; d.textContent='…'; pg.appendChild(d); }
    pg.appendChild(mkBtn(p, p, p===cur));
    prev = p;
  }
  pg.appendChild(mkBtn('→', cur+1, false, cur===total));
}

// ═══════════════════════════════════════════════════════════════
// Book detail modal
// ═══════════════════════════════════════════════════════════════
function openBookModal(book) {
  const e = book.entry;
  // Guard: if the modal elements are missing (e.g. stale cached HTML served
  // without the current markup), bail out rather than throwing an unhandled error.
  if (!document.getElementById('bmTitle')) {
    console.error(
      '[OpenLibrary] openBookModal: modal elements not found in DOM. ' +
      'Try a hard-refresh (Ctrl+Shift+R) to reload the latest index.html.'
    );
    return;
  }
  document.getElementById('bmTitle').textContent = e.title || 'Untitled';
  document.getElementById('bmAuthor').textContent = e.author || 'Unknown author';
  document.getElementById('bmId').textContent = book.id;

  const seriesRow = document.getElementById('bmSeriesRow');
  if (e.series) {
    seriesRow.style.display = 'flex';
    document.getElementById('bmSeries').textContent =
      `${e.series} #${+(e.series_index||0)}`;
  } else { seriesRow.style.display = 'none'; }

  // Unique formats across all sources
  const uniqueFormats = [...new Set(book.formatEntries.map(fe => fe.format))];
  document.getElementById('bmFormats').textContent = uniqueFormats.join(', ') || '—';


  // Source label in header tag
  const srcNames = [...new Set(book.formatEntries.map(fe => fe.libName))];
  document.getElementById('bmSource').textContent = srcNames.join(' · ');

  // Cover
  const bmCoverEl = document.getElementById('bmCover');
  const ph = document.getElementById('bmCoverPh');
  ph.textContent = (e.title||'?')[0].toUpperCase();
  ph.style.display = 'flex';
  // Remove old img if present
  const oldImg = bmCoverEl.querySelector('img');
  if (oldImg) oldImg.remove();
  if (state.coverCache.has(book.id)) {
    const img = document.createElement('img');
    img.id = 'bmCoverImg'; img.dataset.bookId = book.id;
    img.src = state.coverCache.get(book.id); img.alt='cover';
    img.className='bm-cover-ph';
    bmCoverEl.appendChild(img); ph.style.display='none';
  } else if (e.source_cover) {
    const img = document.createElement('img');
    img.id = 'bmCoverImg'; img.dataset.bookId = book.id;
    img.alt='cover'; img.className='bm-cover-ph'; img.style.display='none';
    bmCoverEl.appendChild(img);
    loadCover(book.id); // async, will update when ready
  }

  // Download buttons — one per formatEntry, labelled with source when merged
  const btns = document.getElementById('bmDlButtons');
  btns.innerHTML = '';
  if (book.formatEntries.length === 0) {
    btns.innerHTML = '<span style="color:var(--muted);font-size:.82rem">No downloadable formats found.</span>';
  } else {
    // Read Online first
    for (const fe of book.formatEntries) {
      if (fe.format === 'epub' && fe.sourceFile) {
        const readBtn = document.createElement('a');
        readBtn.className = 'btn-dl btn-read';
        readBtn.href = buildReaderUrl(fe, book.entry.title || '');
        readBtn.target = '_blank';
        readBtn.rel = 'noopener noreferrer';
        readBtn.innerHTML = `Read Online${book.merged ? ` (${fe.libName})` : ''}`;
        btns.appendChild(readBtn);
      }
    }
    // Download buttons
    for (const fe of book.formatEntries) {
      const btn = document.createElement('button');
      btn.className = 'btn-dl';
      const fmtLabel = fe.format.toUpperCase();
      const srcLabel = book.merged ? ` (${fe.libName})` : '';
      const sizeLabel = fe.filesize ? `\u2002${CRYPTO.formatBytes(fe.filesize)}` : '';
      btn.innerHTML = `⬇ ${fmtLabel}${srcLabel}${sizeLabel}`;
      btn.addEventListener('click', () => downloadBook(fe, book.entry, btn));
      btns.appendChild(btn);
    }
  }

  document.getElementById('bookOverlay').classList.add('open');
}

function buildReaderUrl(fe, title) {
  const params = JSON.stringify({
    src:     `${normaliseUrl(fe.libUrl)}/${fe.sourceFile}`,
    key:     fe.sourceKey,
    title:   title || '',
    libHash: location.hash
  });
  // base64url encode
  const b64 = btoa(unescape(encodeURIComponent(params)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
  return 'reader/index.html#' + b64;
}

async function downloadBook(fe, entry, btn) {
  const { format, libUrl, sourceFile, sourceKey } = fe;
  if (!sourceFile) { alert('Source file not found for ' + format); return; }

  const orig = btn.innerHTML;
  btn.disabled = true;

  function setProgress(pct, label) {
    btn.innerHTML =
      `<span class="dl-prog-wrap">` +
      `<span class="dl-prog-bar" style="width:${pct}%"></span>` +
      `<span class="dl-prog-label">${label}</span>` +
      `</span>`;
  }

  try {
    const keyBuf = CRYPTO.hexToBuffer(sourceKey);
    setProgress(0, 'Connecting…');
    const res = await fetch(`${normaliseUrl(libUrl)}/${sourceFile}`);
    if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);

    const contentLength = parseInt(res.headers.get('Content-Length') || '0', 10);
    const hasLength = contentLength > 0;

    const reader = res.body.getReader();
    const chunks = [];
    let received = 0;
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
      received += value.length;
      if (hasLength) {
        // Reserve last 10% for decrypt phase
        const pct = Math.round((received / contentLength) * 88);
        setProgress(pct,
          `${CRYPTO.formatBytes(received)} / ${CRYPTO.formatBytes(contentLength)}`);
      } else {
        setProgress(15, `Downloading ${CRYPTO.formatBytes(received)}…`);
      }
    }

    // Reassemble into single buffer
    const encBuf = new Uint8Array(received);
    let off = 0;
    for (const chunk of chunks) { encBuf.set(chunk, off); off += chunk.length; }

    setProgress(90, 'Decrypting…');
    const plain = await CRYPTO.decryptWithKey(encBuf.buffer, keyBuf);
    setProgress(100, 'Done!');
    const mimeMap = { epub:'application/epub+zip', mobi:'application/x-mobipocket-ebook',
      pdf:'application/pdf', azw3:'application/x-mobipocket-ebook' };
    const mime = mimeMap[format] || 'application/octet-stream';
    const blob = new Blob([plain], { type: mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const fname = `${entry.title||'book'}${entry.author?' - '+entry.author:''}.${format}`;
    a.href = url; a.download = fname.replace(/[<>:"/\\|?*]/g,'_');
    document.body.appendChild(a); a.click();
    setTimeout(() => { URL.revokeObjectURL(url); document.body.removeChild(a); }, 1000);
  } catch(err) {
    alert('Download failed: '+err.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = orig;
  }
}

// ═══════════════════════════════════════════════════════════════
// Source management
// ═══════════════════════════════════════════════════════════════
function removeSource(url) {
  url = normaliseUrl(url);
  state.sources = state.sources.filter(s => normaliseUrl(s.url) !== url);
  state.libs.delete(url);
  // Clean up cover cache for books from this lib
  for (const [id, _] of (state.libs.get(url)||{books:new Map()}).books||[]) {
    const cached = state.coverCache.get(id);
    if (cached) { URL.revokeObjectURL(cached); state.coverCache.delete(id); }
  }
  saveSources(state.sources);
  rebuildBookList();
  renderAll();
}

async function addSource(url, name, password) {
  url = normaliseUrl(url);
  if (!state.sources.find(s => normaliseUrl(s.url) === url)) {
    const src = { url, name: name || url };
    if (password != null) src.password = password;
    state.sources.push(src);
    saveSources(state.sources);
    renderChips();
  }
  try {
    const { name: realName, bookCount } = await loadLibrary(url);
    // Update name in sources if we got a real one
    const src = state.sources.find(s => normaliseUrl(s.url) === url);
    if (src) { src.name = realName || src.name; saveSources(state.sources); }
    renderAll();
  } catch(err) {
    showStatus('Error loading '+url+': '+err.message, 'error');
    renderChips();
  }
}

// ═══════════════════════════════════════════════════════════════
// Add-source dialog
// ═══════════════════════════════════════════════════════════════
let _pendingLib = null; // { url, name, links, bookCount }

function openAddDialog() {
  _pendingLib = null;
  document.getElementById('addUrl').value = '';
  document.getElementById('addError').classList.remove('show');
  document.getElementById('addPreview').classList.remove('show');
  document.getElementById('addPreviewBtn').style.display = '';
  document.getElementById('addConfirmBtn').style.display = 'none';
  document.getElementById('linkedContainer').style.display = 'none';
  document.getElementById('addOverlay').classList.add('open');
  setTimeout(() => document.getElementById('addUrl').focus(), 80);
}

function closeAddDialog() {
  document.getElementById('addOverlay').classList.remove('open');
}

async function previewLibrary() {
  const raw = document.getElementById('addUrl').value.trim();
  if (!raw) return showAddError('Please enter a URL.');
  const url = normaliseUrl(raw);
  // If shorthand was expanded, reflect the resolved URL back into the input
  if (url !== raw) document.getElementById('addUrl').value = url;
  if (state.sources.find(s => normaliseUrl(s.url) === url)) {
    return showAddError('This source is already in your library list.');
  }
  const btn = document.getElementById('addPreviewBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Fetching…';
  document.getElementById('addError').classList.remove('show');
  try {
    const libJson = await fetchLib(url);
    const encryptionType = libJson.encryption_type;
    let bookCount = '?';
    if (encryptionType === 0) {
      try {
        const idx = await decryptIndex(libJson, '0');
        bookCount = Object.keys(idx).length;
      } catch { bookCount = '?'; }
    }
    const links = libJson.links || {};
    const linkEntries = Object.entries(links)
      .filter(([,v]) => v && (v.link||v.url));

    document.getElementById('prevName').textContent = libJson.name || url;
    document.getElementById('prevCount').textContent = encryptionType !== 0
      ? `🔐 Password required · type ${encryptionType}`
      : `${bookCount} book${bookCount!==1?'s':''}  · type ${encryptionType}`;

    const lc = document.getElementById('linkedContainer');
    const ll = document.getElementById('linkedList');
    ll.innerHTML = '';
    if (linkEntries.length > 0) {
      lc.style.display = 'block';
      for (const [name, val] of linkEntries) {
        const linkUrl = normaliseUrl(val.link || val.url || '');
        const already = !!state.sources.find(s => normaliseUrl(s.url) === linkUrl);
        const item = document.createElement('div');
        item.className = 'linked-item';
        item.innerHTML = `
          <input type="checkbox" id="lnk-${esc(linkUrl)}" value="${esc(linkUrl)}" ${already?'disabled checked':''}>
          <div>
            <div class="linked-name">${esc(name)}</div>
            <div class="linked-url">${esc(linkUrl)}</div>
          </div>
          ${already?'<span class="linked-already">✓ already added</span>':''}
        `;
        ll.appendChild(item);
      }
    } else { lc.style.display = 'none'; }

    document.getElementById('addPreview').classList.add('show');
    document.getElementById('addConfirmBtn').style.display = '';
    document.getElementById('addPreviewBtn').style.display = 'none';
    _pendingLib = { url, name: libJson.name||url, links: linkEntries, encryptionType, libJson };
  } catch(err) {
    showAddError('Could not load library: '+err.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Preview';
  }
}

async function confirmImport() {
  if (!_pendingLib) return;
  // If the library needs a password, close the add dialog and open the key prompt.
  // The key prompt handler is responsible for actually adding the source.
  if (_pendingLib.encryptionType !== 0) {
    closeAddDialog();
    openKeyPrompt();
    return;
  }
  closeAddDialog();
  // Add primary source (no password needed)
  await addSource(_pendingLib.url, _pendingLib.name);
  // Add checked linked sources
  document.querySelectorAll('#linkedList input[type=checkbox]:checked:not(:disabled)').forEach(cb => {
    const linkUrl = cb.value;
    const name = cb.closest('.linked-item').querySelector('.linked-name').textContent;
    addSource(linkUrl, name);
  });
}

// ── Key prompt (for password-protected libraries) ──────────────────────────
function openKeyPrompt() {
  document.getElementById('keyDlgDesc').textContent =
    `"${_pendingLib.name}" is password-protected. Enter the decryption password to unlock it.`;
  document.getElementById('keyInput').value = '';
  document.getElementById('keyError').classList.remove('show');
  document.getElementById('keyOverlay').classList.add('open');
  setTimeout(() => document.getElementById('keyInput').focus(), 80);
}

function closeKeyPrompt() {
  document.getElementById('keyOverlay').classList.remove('open');
}

async function tryUnlockKey() {
  if (!_pendingLib) return;
  const password = document.getElementById('keyInput').value;
  if (!password) { showKeyError('Please enter a password.'); return; }

  const btn = document.getElementById('keyUnlockBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Checking…';
  document.getElementById('keyError').classList.remove('show');
  try {
    // Validate the password before touching state
    const idx = await decryptIndex(_pendingLib.libJson, password);
    const bookCount = Object.keys(idx).length;
    // Password is good — now persist and load
    closeKeyPrompt();
    await addSource(_pendingLib.url, _pendingLib.name, password);
    // Add any checked linked sources (they'll ask for their own key if needed)
    document.querySelectorAll('#linkedList input[type=checkbox]:checked:not(:disabled)').forEach(cb => {
      const linkUrl = cb.value;
      const name = cb.closest('.linked-item').querySelector('.linked-name').textContent;
      addSource(linkUrl, name);
    });
    showStatus(`"${_pendingLib.name}" unlocked — ${bookCount} book${bookCount!==1?'s':''} loaded.`, 'info');
  } catch {
    showKeyError('Incorrect password — decryption failed. Please try again.');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Unlock';
  }
}

function showKeyError(msg) {
  const el = document.getElementById('keyError');
  el.textContent = msg;
  el.classList.add('show');
}

function showAddError(msg) {
  const el = document.getElementById('addError');
  el.textContent = msg; el.classList.add('show');
}

// ═══════════════════════════════════════════════════════════════
// Status banner
// ═══════════════════════════════════════════════════════════════
let _statusTimer = null;
function showStatus(msg, type='info', duration=5000) {
  const el = document.getElementById('statusBanner');
  el.textContent = msg;
  el.className = 'status-banner show ' + type;
  clearTimeout(_statusTimer);
  if (duration > 0) _statusTimer = setTimeout(() => el.classList.remove('show'), duration);
}

// ═══════════════════════════════════════════════════════════════
// Utilities
// ═══════════════════════════════════════════════════════════════
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ═══════════════════════════════════════════════════════════════
// Theme management
// ═══════════════════════════════════════════════════════════════
function applyTheme(val) {
  if (val === 'light' || val === 'dark' || val === 'sepia') {
    document.documentElement.dataset.theme = val;
  } else {
    delete document.documentElement.dataset.theme;
  }
  const sel = document.getElementById('themeSelect');
  if (sel) sel.value = val;
  try { localStorage.setItem('ol-theme', val); } catch {}
}
// Apply before first paint to avoid flash
(function() {
  let saved = 'auto';
  try { saved = localStorage.getItem('ol-theme') || 'auto'; } catch {}
  applyTheme(saved);
})();

// ═══════════════════════════════════════════════════════════════
// Event wiring
// ═══════════════════════════════════════════════════════════════
document.getElementById('themeSelect').addEventListener('change', e => applyTheme(e.target.value));

// ═══════════════════════════════════════════════════════════════
// Sources manager (full-screen overlay)
// ═══════════════════════════════════════════════════════════════
function openSourcesManager() {
  document.getElementById('sourcesOverlay').classList.add('open');
}
function closeSourcesManager() {
  document.getElementById('sourcesOverlay').classList.remove('open');
  document.getElementById('srcImportPanel').classList.remove('show');
  document.getElementById('srcImportTa').value = '';
  document.getElementById('srcImportError').classList.remove('show');
}

document.getElementById('btnSources').addEventListener('click', openSourcesManager);
document.getElementById('srcMgrClose').addEventListener('click', closeSourcesManager);

document.getElementById('srcExportBtn').addEventListener('click', () => {
  const json = JSON.stringify(state.sources, null, 2);
  navigator.clipboard.writeText(json).then(() => {
    const btn = document.getElementById('srcExportBtn');
    const orig = btn.textContent;
    btn.textContent = '✓ Copied!';
    setTimeout(() => { btn.textContent = orig; }, 2000);
  }).catch(() => prompt('Copy this JSON:', json));
});

document.getElementById('srcImportBtn').addEventListener('click', () => {
  const panel = document.getElementById('srcImportPanel');
  const isOpen = panel.classList.toggle('show');
  if (isOpen) setTimeout(() => document.getElementById('srcImportTa').focus(), 50);
});

document.getElementById('srcImportCancel').addEventListener('click', () => {
  document.getElementById('srcImportPanel').classList.remove('show');
  document.getElementById('srcImportTa').value = '';
  document.getElementById('srcImportError').classList.remove('show');
});

document.getElementById('srcImportConfirm').addEventListener('click', () => {
  const raw = document.getElementById('srcImportTa').value.trim();
  const errEl = document.getElementById('srcImportError');
  errEl.classList.remove('show');
  let parsed;
  try { parsed = JSON.parse(raw); } catch(e) {
    errEl.textContent = 'Invalid JSON: ' + e.message;
    errEl.classList.add('show');
    return;
  }
  if (!Array.isArray(parsed)) {
    errEl.textContent = 'Expected a JSON array of source objects [{url, name}].';
    errEl.classList.add('show');
    return;
  }
  const newSources = [];
  for (const item of parsed) {
    if (!item.url) continue;
    const url = normaliseUrl(item.url);
    if (!state.sources.find(s => normaliseUrl(s.url) === url)) {
      state.sources.push({ url, name: item.name || url });
      newSources.push({ url, name: item.name || url });
    }
  }
  saveSources(state.sources);
  document.getElementById('srcImportPanel').classList.remove('show');
  document.getElementById('srcImportTa').value = '';
  renderChips();
  if (newSources.length > 0) {
    showStatus(`Importing ${newSources.length} new source${newSources.length>1?'s':'…'}`, 'info', 0);
    Promise.allSettled(newSources.map(s => loadLibrary(s.url))).then(results => {
      const errors = results.filter(r => r.status==='rejected').map(r => r.reason.message);
      if (errors.length) showStatus('Failed to load '+errors.length+' source(s): '+errors.join('; '), 'error');
      else document.getElementById('statusBanner').classList.remove('show');
      renderAll();
    });
  }
});

document.getElementById('btnAdd').addEventListener('click', () => {
  closeSourcesManager();
  openAddDialog();
});
document.getElementById('addCancel').addEventListener('click', closeAddDialog);
document.getElementById('addPreviewBtn').addEventListener('click', previewLibrary);
document.getElementById('addConfirmBtn').addEventListener('click', confirmImport);
document.getElementById('bmClose').addEventListener('click', () => {
  document.getElementById('bookOverlay').classList.remove('open');
});

// Close overlays on backdrop click or Escape
['bookOverlay','addOverlay','sourcesOverlay'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => {
    if (e.target.id===id) document.getElementById(id).classList.remove('open');
  });
});
document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  document.getElementById('bookOverlay').classList.remove('open');
  document.getElementById('addOverlay').classList.remove('open');
  closeSourcesManager();
});

// Enter key in URL field triggers preview
document.getElementById('addUrl').addEventListener('keydown', e => {
  if (e.key==='Enter') previewLibrary();
});

// Key prompt overlay
document.getElementById('keyCancel').addEventListener('click', closeKeyPrompt);
document.getElementById('keyUnlockBtn').addEventListener('click', tryUnlockKey);
document.getElementById('keyInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') tryUnlockKey();
});

document.getElementById('searchInput').addEventListener('input', e => {
  state.search = e.target.value;
  applyFilter();
});

document.getElementById('sortSelect').addEventListener('change', e => {
  state.sort = e.target.value;
  applyFilter();
});

// ═══════════════════════════════════════════════════════════════
// Initialise — load all sources from hash
// ═══════════════════════════════════════════════════════════════
(async function init() {
  renderAll(); // show empty state / sources immediately
  if (state.sources.length === 0) return;
  showStatus(`Loading ${state.sources.length} source${state.sources.length>1?'s':''}…`, 'info', 0);
  const results = await Promise.allSettled(
    state.sources.map(s => loadLibrary(s.url))
  );
  const errors = results.filter(r => r.status==='rejected').map(r => r.reason.message);
  if (errors.length) showStatus('Failed to load '+errors.length+' source(s): '+errors.join('; '), 'error');
  else { document.getElementById('statusBanner').classList.remove('show'); }
  renderAll();
})();
</script>
